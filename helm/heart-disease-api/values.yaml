backend:
  replicaCount: 2
  image:
    repository: yourdockerhub/heart-disease-backend
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000

frontend:
  replicaCount: 2
  image:
    repository: yourdockerhub/heart-disease-frontend
    tag: "latest"
    pullPolicy: Always
  service:
    type: LoadBalancer
    port: 80
    targetPort: 80

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
