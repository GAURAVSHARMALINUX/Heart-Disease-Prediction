# Default values for heart-disease-api Helm chart.
# Override these values with --set or a custom values file.

# ─── Global ───────────────────────────────────────────────────────────────────
global:
  dockerUsername: "2024ab05112"
  imageTag: "latest"

# ─── Backend (FastAPI) ────────────────────────────────────────────────────────
backend:
  enabled: true
  replicaCount: 2
  image:
    repository: "2024ab05112/heart-disease-api"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 15
  readinessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 15

# ─── Frontend (Django) ────────────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: "2024ab05112/heart-disease-frontend"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: "heart-disease-2024ab05112.centralindia.cloudapp.azure.com"
  tls: []

# ─── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  replicaCount: 1
  image:
    repository: prom/prometheus
    tag: latest
  service:
    port: 9090
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ─── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  replicaCount: 1
  image:
    repository: grafana/grafana
    tag: latest
  service:
    port: 3000
  adminPassword: "admin"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
