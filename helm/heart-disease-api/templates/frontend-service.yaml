apiVersion: v1
kind: Service
metadata:
  name: {{ include "heart-disease-api.fullname" . }}-frontend
  labels:
    app: {{ include "heart-disease-api.name" . }}-frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "heart-disease-api.name" . }}-frontend
