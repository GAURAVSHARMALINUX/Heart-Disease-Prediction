name: Build and Deploy to AKS

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'SERVICE_ARCHITECTURE.md'
      - 'wiki_content/**'
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  RESOURCE_GROUP: "HeartDiseaseRG"
  CLUSTER_NAME: "HeartDiseaseCluster"

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            k8s:
              - 'k8s/**'
              - '.github/workflows/**'

  build-frontend:
    needs: check-changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/heart-disease-frontend:${{ github.sha }}
            ${{ env.DOCKER_USERNAME }}/heart-disease-frontend:latest

  start-cluster:
    needs: check-changes
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Start AKS Cluster (if stopped)
        run: |
          STATUS=$(az aks show --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.CLUSTER_NAME }} --query "powerState.code" -o tsv || echo "Running")
          echo "Current Cluster Status: $STATUS"
          if [ "$STATUS" == "Stopped" ]; then
            echo "Cluster is stopped. Starting it now..."
            az aks start --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.CLUSTER_NAME }}
          fi

  unit-test:
    needs: check-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r unit-test-requirement.txt
      - name: Lint with flake8
        working-directory: ./backend
        run: |
          flake8 src . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Run tests
        working-directory: ./backend
        run: |
          pytest tests/ --junitxml=test-report.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/test-report.xml

  train-model:
    needs: [build-frontend, start-cluster, unit-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt -r unit-test-requirement.txt
      - name: Train model
        working-directory: ./backend
        run: |
          python main_pipeline.py
      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: backend/exported_model/

  build-backend:
    needs: train-model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: backend/exported_model/
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/heart-disease-api:${{ github.sha }}
            ${{ env.DOCKER_USERNAME }}/heart-disease-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Get K8s context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}
          admin: 'true'
      - name: Install Nginx Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.2/deploy/static/provider/cloud/deploy.yaml
          echo "Waiting for Ingress Controller Service..."
          kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=120s
      - name: Assign DNS Label to Ingress IP
        run: |
          NODE_RESOURCE_GROUP=$(az aks show --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.CLUSTER_NAME }} --query nodeResourceGroup -o tsv)
          sleep 30
          IP_NAME=$(az network public-ip list --resource-group $NODE_RESOURCE_GROUP --query "[?contains(name, 'kubernetes')].name" -o tsv | head -n 1)
          if [ ! -z "$IP_NAME" ]; then
            az network public-ip update --resource-group $NODE_RESOURCE_GROUP --name $IP_NAME --dns-name heart-disease-2024ab05112
          fi
      - name: Replace image tags in manifests
        run: |
          sed -i "s|image: .*/heart-disease-api:latest|image: ${{ env.DOCKER_USERNAME }}/heart-disease-api:${{ github.sha }}|g" k8s/backend/backend-deployment.yml
          sed -i "s|image: .*/heart-disease-frontend:latest|image: ${{ env.DOCKER_USERNAME }}/heart-disease-frontend:${{ github.sha }}|g" k8s/frontend/frontend-deployment.yml
      - name: Deploy to AKS
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          manifests: |
            k8s/backend/backend-deployment.yml
            k8s/backend/backend-service.yml
            k8s/frontend/frontend-deployment.yml
            k8s/monitoring/prometheus-config.yml
            k8s/monitoring/prometheus-deployment.yml
            k8s/monitoring/prometheus-service.yml
            k8s/monitoring/grafana-config.yml
            k8s/monitoring/grafana-dashboards.yml
            k8s/monitoring/grafana-deployment.yml
            k8s/monitoring/grafana-service.yml

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services to stabilize
        run: sleep 60
      - name: Health check - Backend API
        run: |
          BASE_URL="http://heart-disease-2024ab05112.centralindia.cloudapp.azure.com"
          echo "--- Testing Backend Health ---"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE_URL/health")
          echo "Backend /health returned: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Backend health check failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Backend health check PASSED"
      - name: Smoke test - Predict endpoint
        run: |
          BASE_URL="http://heart-disease-2024ab05112.centralindia.cloudapp.azure.com"
          echo "--- Testing /api/predict endpoint ---"
          RESPONSE=$(curl -s -o /tmp/predict_response.json -w "%{http_code}" \
            --max-time 30 \
            -X POST "$BASE_URL/api/predict" \
            -H "Content-Type: application/json" \
            -d '{
              "age": 55, "sex": 1, "cp": 2, "trestbps": 130,
              "chol": 250, "fbs": 0, "restecg": 1,
              "thalach": 145, "exang": 0, "oldpeak": 1.5,
              "slope": 1, "ca": 0, "thal": 2
            }')
          echo "Predict endpoint returned: $RESPONSE"
          cat /tmp/predict_response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "ERROR: Predict endpoint failed with status $RESPONSE"
            exit 1
          fi
          echo "Predict endpoint smoke test PASSED"
      - name: Smoke test - Frontend
        run: |
          BASE_URL="http://heart-disease-2024ab05112.centralindia.cloudapp.azure.com"
          echo "--- Testing Frontend ---"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE_URL/")
          echo "Frontend returned: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "WARNING: Frontend returned $HTTP_STATUS (may still be starting)"
          else
            echo "Frontend smoke test PASSED"
          fi
