name: PR Check - Backend
# This workflow runs ONLY on Pull Requests as a quality gate.
# On push to main, the full pipeline is handled by deploy.yml

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  code-quality:
    name: Code Quality (Linting)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run Linting
        working-directory: ./backend
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  model-training-and-tests:
    name: Model Training & Unit Tests
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r unit-test-requirement.txt

      - name: Train Model
        working-directory: ./backend
        env:
          PYTHONPATH: .
        run: python main_pipeline.py

      - name: Run Pytest
        working-directory: ./backend
        env:
          PYTHONPATH: .
        run: python -m pytest tests/

  docker-build-push:
    name: Build & Push Backend Image
    needs: model-training-and-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: backend/exported_model/
        continue-on-error: true

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/heart-disease-api:latest

  # Deploy is intentionally removed from this workflow.
  # Full deployment is handled by deploy.yml on push to main.
