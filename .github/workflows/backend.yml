name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'wiki/**'
      - '.github/workflows/wiki-sync.yml'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'wiki/**'
      - '.github/workflows/wiki-sync.yml'

jobs:
  code-quality:
    name: Code Quality (Linting)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install flake8
        run: pip install flake8
        
      - name: Run Linting
        run: flake8 src/ api/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  model-training-and-tests:
    name: Model Training & Unit Tests
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Download Dataset
        run: python data/download_data.py
          
      - name: Train Model
        env:
          PYTHONPATH: .
        run: python -m src.train
          
      - name: Run Pytest
        env:
          PYTHONPATH: .
        run: python -m pytest tests/

  docker-build-push:
    name: Build & Push Backend Image
    needs: model-training-and-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build and Push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/heart-disease-backend:latest

  deploy-aks:
    name: Deploy Backend to AKS
    needs: docker-build-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.AZURE_KUBE_CONFIG }}

      - name: Deploy via Helm
        run: |
          helm upgrade --install heart-disease-api ./helm/heart-disease-api \
            --set backend.image.repository=${{ secrets.DOCKER_USERNAME }}/heart-disease-backend \
            --set backend.image.tag=latest
